spring.application.name=demo
spring.security.oauth2.client.registration.google.clientId=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.clientSecret=${GOOGLE_CLIENT_SECRET}

spring.datasource.url=jdbc:mysql://localhost:3306/db_bloco_de_notas
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Aqui dizemos que o hibernate não vai mais ter a responsabilidade de gerenciar as estruturas do banco. Isso ficará a
#cargo do flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

#Essa propriedade serve para ativarmos o Flyway
spring.flyway.enabled=true

#Essa propriedade para criar uma tabela com as migrações e assim ter acesso ao histórico de modificações.
spring.flyway.baseline-on-migrate=true 

api.security.token.secret=${JWT_SECRET:my-secret-key}